version: '3.8'

services:
  backend:
    build: ./server
    container_name: factory_backend
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    restart: always

  frontend:
    build: .
    container_name: factory_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
